<article class="model-card example-model-card">
    <header class="model-card-header">
        <strong class="model-card-title">{{display_name}}</strong>
        <span class="topic-state-pill {{value_class}}">{{value_label}}</span>
    </header>
    <div class="model-card-grid">
        <div class="popup-metric">
            <span class="popup-metric-label">Route position</span>
            <strong>{{position_on_route}} m</strong>
        </div>
        <div class="popup-metric">
            <span class="popup-metric-label">Value</span>
            <strong>{{value_label}}</strong>
        </div>
    </div>
</article>
