<div class="simulation-popup-header">
    <span class="simulation-popup-title">{{display_name}}</span>
    <button type="button" class="simulation-popup-close" aria-label="Close popup">x</button>
</div>
<div class="simulation-popup-body">
    <div class="simulation-popup-grid">
        <div class="popup-metric">
            <span class="popup-metric-label">Route position</span>
            <strong>{{position_on_route}} m</strong>
        </div>
        <div class="popup-metric">
            <span class="popup-metric-label">Value</span>
            <strong>{{value_label}}</strong>
        </div>
    </div>
</div>
